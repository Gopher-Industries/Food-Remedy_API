name: Database Pipeline

on:
  schedule:
    - cron: '0 2 1 */4 *' # 1st of every 4th month at 02:00 UTC
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make CI script executable
        run: chmod +x scripts/run_pipeline_ci.sh

      - name: Run pipeline
        env:
          # Optional: provide these in repository secrets if your pipeline needs DB access
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          CONFIG: database/pipeline/pipeline.config.json
          FORCE: ${{ secrets.PIPELINE_FORCE }}
        run: ./scripts/run_pipeline_ci.sh

      - name: Upload pipeline metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-metadata
          path: database/pipeline/pipeline_run_metadata.json
